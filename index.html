<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shelley Event - 감성을 잇는 사진 공간</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="app" class="app-container">
        <!-- Navigation Header -->
        <header class="app-header">
            <div class="logo">Shelley <span>Event</span></div>
            <div class="header-actions">
                <span id="auth-status" style="font-size: 0.8rem; margin-right: 8px; color: var(--text-muted);"></span>
                <button id="login-btn" class="btn-secondary" style="padding: 4px 10px; font-size: 0.8rem; margin-right: 8px;">로그인</button>
                <button id="admin-toggle" class="icon-btn" title="관리자">
                    <i data-lucide="shield"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="fade-in">
            <!-- Dynamic content loaded here via app.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="home">
                <i data-lucide="home"></i>
                <span>홈</span>
            </button>
            <button class="nav-item" data-view="flow-selection">
                <i data-lucide="camera"></i>
                <span>촬영/조회</span>
            </button>
            <button class="nav-item" data-view="studio">
                <i data-lucide="palette"></i>
                <span>스튜디오</span>
            </button>
            <button class="nav-item" data-view="store">
                <i data-lucide="shopping-bag"></i>
                <span>스토어</span>
            </button>
        </nav>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content card" style="position: relative;">
            <h2 class="section-title" style="text-align: center; margin-bottom: 24px;">회원가입 / 로그인</h2>
            <div style="margin-bottom: 20px;">
                <input type="email" id="email-input" class="input-field" placeholder="이메일 주소를 입력하세요">
                <button id="email-login-btn" class="btn-primary" style="margin-top: 12px;">이메일로 계속하기</button>
            </div>
            
            <div class="divider">
                <span>또는</span>
            </div>
            
            <button id="google-login-btn" class="btn-secondary" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google 계정으로 연결
            </button>
            
            <button id="facebook-login-btn" class="btn-secondary" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 12px; background-color: rgba(24, 119, 242, 0.1); border-color: rgba(24, 119, 242, 0.3);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook 계정으로 연결
            </button>

            <button id="close-modal-btn" class="icon-btn" style="position: absolute; top: 16px; right: 16px; background: none; border: none; color: white;">
                <i data-lucide="x"></i>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js" type="module"></script>
</body>
</html>
